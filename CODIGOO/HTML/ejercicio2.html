html> <lang="es">
    <head>
        <meta charset="UFT-8">
        <meta name="viewport" content="width=device-width, inicial-sacle=1.0">
        <title>FORMULARIO COMPLETO</title>

        <style>
            body{
                font-family:Arial, Helvetica, sans-serif;
                background-color: #f4f4f4;
                padding: 20px;
            }

            form{
                background-color: white;
                padding: 20px;
                border: radius 10px;
                width: 400px
                margin:auto;

            }

            h2{
                text-align: center;
            }
            label{
                font-weight: bold;
            }
            input, select, textarea{
                width: 100%;
                padding: 8px;
                margin-top: 5px;
                margin-bottom: 15px;
            }
            .opciones{
                width: auto;
                margin-right: 5px;

            }
            button{
                background-color: #3498db;
                color: white;
                border: none;
                padding: 10px;
                width: 100%;
                border-radius: 5px;
                cursor: pointer;
            }
            button:hover{
                background-color: #3498db;
            }
        </style>
    </head>
    <body>
        <form>
            <h2>Formulario de registro</h2>
            <!--Texto-->
            <label>nombre:</label>
            <input type="text"placeholder="ingrese su nombre">

              <!--contraseña-->
            <label>contraseña:</label>
            <input type="pasword"placeholder="ingrese su contraseña">

              <!--email-->
            <label>correo electronico:</label>
            <input type="email"placeholder="ejemplo@gmail.com">

              <!--fecha-->
            <label>fecha de nacimiento:</label>
            <input type="date">

            <!-- radio buttons -->
             <label> Genero</label><br>
             <input class="opciones"type="radio" name="genero">
             masculno
             <input class="opciones"type="radio" name="genero">
             femenino
             <input class="opciones"type="radio" name="genero">
             otro
             <br><br>
             <!-- checkbox -->
              <label>Hobbies</label><br>
               <input class="opciones" type="checkbox">
                 Deportes

            <input class="opciones" type="checkbox">
             Musica

            <input class="opciones" type="checkbox">
            Videojuegos
            <br><br>
            <!-- select -->
             <label>ciudad:</label>
             <select>
                <option >Bogota</option>
                <option >Medellin</option>
                <option >Cali</option>
                <option >Barranquilla</option>
             </select>
              <!-- textarea -->
               <label>Comentarios</label>
               <textarea rows="5"placeholder="escriba aqui ..."></textarea>
               <!-- botón -->
                <button type="submit">Enviar</button>
        </form>
    </body>
